server:
  port: 8080

spring:
  application:
    name: api-gateway
    
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      httpclient:
        connect-timeout: 10000
        response-timeout: 30s
        
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
    
  security:
    jwt:
      secret: ${JWT_SECRET}

# CORS Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:8080}
  internal:
    service-secret: ${INTERNAL_SERVICE_SECRET:secure-shared-secret-change-in-production}

services:
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:8081}
  hotel-service:
    url: ${HOTEL_SERVICE_URL:http://hotel-service:8082}
  booking-service:
    url: ${BOOKING_SERVICE_URL:http://booking-service:8083}
  search-service:
    url: ${SEARCH_SERVICE_URL:http://search-service:8084}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      hotelServiceCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      bookingServiceCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      searchServiceCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1000ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

# Rate Limiting Configuration
rate-limit:
  default:
    requests-per-minute: 60
  authenticated:
    requests-per-minute: 120

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    gateway:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    com.hotel.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
  file:
    name: logs/api-gateway.log

# API Gateway Configuration
gateway:
  api:
    public-paths:
      # following paths should not require authentication
      - /api/v1/auth/**
      - /api/v1/search/**
      - /api/v1/inventory/check-availability
      - /health/**
      - /actuator/health
      - /actuator/health/**
      - /fallback/**
